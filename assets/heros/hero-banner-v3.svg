<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EU MDR の規制文書群を抽象化したドキュメントマップ</title>
  <desc id="desc">CER・Technical Documentation・Annex I などの規制文書を、白いカードの重なりで表現。各カードの上端にラベルと条文参照が並ぶ。</desc>

  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafd"></stop>
      <stop offset="100%" stop-color="#e6edf6"></stop>
    </linearGradient>
    <linearGradient id="cardShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#f4f7fb"></stop>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg3)"></rect>

  
  <g font-family="Inter, sans-serif" fill="#6b7c9d" letter-spacing="0.22em">
    <text x="80" y="100" font-size="11" font-weight="600">REGULATORY DOCUMENT MAP</text>
    <line x1="80" y1="118" x2="260" y2="118" stroke="#2d61a8" stroke-width="2"></line>
    <text x="80" y="142" font-size="10" font-weight="500" letter-spacing="0.16em" fill="#9aacc7">MDR (EU) 2017/745 — Technical File &amp; Beyond</text>
  </g>

  
  <g transform="translate(600 470)">
    
    <g transform="translate(120 -50) rotate(7)">
      <rect x="-180" y="-220" width="360" height="440" rx="6" fill="url(#cardShade)" stroke="#c8d5e8" stroke-width="1"></rect>
      <text x="-156" y="-178" font-family="Inter" font-size="9.5" font-weight="700" fill="#5b91cc" letter-spacing="0.2em">ANNEX I · GSPR</text>
      <line x1="-156" y1="-160" x2="-30" y2="-160" stroke="#5b91cc" stroke-width="1.5"></line>
      <g stroke="#dde6f0" stroke-width="3" stroke-linecap="round">
        <line x1="-156" y1="-126" x2="120" y2="-126"></line>
        <line x1="-156" y1="-104" x2="146" y2="-104"></line>
        <line x1="-156" y1="-82" x2="90" y2="-82"></line>
        <line x1="-156" y1="-48" x2="140" y2="-48"></line>
        <line x1="-156" y1="-26" x2="100" y2="-26"></line>
        <line x1="-156" y1="-4" x2="128" y2="-4"></line>
        <line x1="-156" y1="30" x2="120" y2="30"></line>
        <line x1="-156" y1="52" x2="146" y2="52"></line>
      </g>
    </g>

    
    <g transform="translate(-30 0) rotate(-4)">
      <rect x="-180" y="-220" width="360" height="440" rx="6" fill="url(#cardShade)" stroke="#c8d5e8" stroke-width="1"></rect>
      <text x="-156" y="-178" font-family="Inter" font-size="9.5" font-weight="700" fill="#5b91cc" letter-spacing="0.2em">TECHNICAL DOCUMENTATION</text>
      <line x1="-156" y1="-160" x2="40" y2="-160" stroke="#5b91cc" stroke-width="1.5"></line>
      <g stroke="#dde6f0" stroke-width="3" stroke-linecap="round">
        <line x1="-156" y1="-126" x2="100" y2="-126"></line>
        <line x1="-156" y1="-104" x2="138" y2="-104"></line>
        <line x1="-156" y1="-82" x2="80" y2="-82"></line>
        <line x1="-156" y1="-48" x2="140" y2="-48"></line>
        <line x1="-156" y1="-26" x2="110" y2="-26"></line>
        <line x1="-156" y1="-4" x2="128" y2="-4"></line>
        <line x1="-156" y1="30" x2="120" y2="30"></line>
        <line x1="-156" y1="52" x2="100" y2="52"></line>
        <line x1="-156" y1="74" x2="140" y2="74"></line>
      </g>
      
      <g transform="translate(-156 130)">
        <rect width="100" height="20" rx="3" fill="#f4f7fb" stroke="#c8d5e8" stroke-width="0.5"></rect>
        <text x="50" y="14" text-anchor="middle" font-family="Inter" font-size="9" font-weight="600" fill="#6b7c9d" letter-spacing="0.12em">Annex II</text>
      </g>
    </g>

    
    <g transform="translate(-170 80) rotate(-1.5)">
      <rect x="-180" y="-220" width="360" height="440" rx="6" fill="#ffffff" stroke="#2d61a8" stroke-width="2"></rect>
      <text x="-156" y="-178" font-family="Inter" font-size="10" font-weight="700" fill="#2d61a8" letter-spacing="0.2em">CER · ART. 61</text>
      <line x1="-156" y1="-160" x2="80" y2="-160" stroke="#2d61a8" stroke-width="2"></line>
      <text x="-156" y="-138" font-family="Inter" font-size="13" font-weight="700" fill="#1c3068" letter-spacing="0.06em">Clinical Evaluation</text>
      <g stroke="#dde6f0" stroke-width="3" stroke-linecap="round">
        <line x1="-156" y1="-104" x2="120" y2="-104"></line>
        <line x1="-156" y1="-82" x2="146" y2="-82"></line>
        <line x1="-156" y1="-60" x2="90" y2="-60"></line>
        <line x1="-156" y1="-26" x2="140" y2="-26"></line>
        <line x1="-156" y1="-4" x2="110" y2="-4"></line>
        <line x1="-156" y1="18" x2="128" y2="18"></line>
        <line x1="-156" y1="40" x2="100" y2="40"></line>
        <line x1="-156" y1="62" x2="146" y2="62"></line>
        <line x1="-156" y1="84" x2="120" y2="84"></line>
      </g>
      
      <g transform="translate(-156 140)" font-family="Inter" font-size="9" font-weight="600" letter-spacing="0.12em">
        <rect width="90" height="22" rx="3" fill="#ddeaf8" stroke="#2d61a8" stroke-width="0.5"></rect>
        <text x="45" y="15" text-anchor="middle" fill="#2d61a8">MDCG 2020-1</text>
        <rect x="100" width="90" height="22" rx="3" fill="#f4f7fb" stroke="#c8d5e8" stroke-width="0.5"></rect>
        <text x="145" y="15" text-anchor="middle" fill="#6b7c9d">MDCG 2020-13</text>
      </g>
    </g>
  </g>

  
  <g font-family="Inter" letter-spacing="0.18em">
    <line x1="80" y1="800" x2="180" y2="800" stroke="#c8d5e8" stroke-width="1"></line>
    <text x="80" y="824" font-size="10" font-weight="600" fill="#6b7c9d">CER · TECHNICAL FILE · DoC · PMS</text>
    <text x="80" y="842" font-size="9" letter-spacing="0.14em" fill="#9aacc7">Annex I · II · III &amp; MDCG Guidances</text>
  </g>
</svg>