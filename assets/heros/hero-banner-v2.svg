<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Economic Operator の責任分界を表すネットワーク図</title>
  <desc id="desc">中央のデバイスを Manufacturer・Authorised Representative・Importer・Distributor の4ノードが囲み、責任のつながりを破線で示す抽象図。</desc>

  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafd"></stop>
      <stop offset="100%" stop-color="#e6edf6"></stop>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg2)"></rect>

  
  <g font-family="Inter, sans-serif" fill="#6b7c9d" letter-spacing="0.22em">
    <text x="80" y="100" font-size="11" font-weight="600">ECONOMIC OPERATORS</text>
    <line x1="80" y1="118" x2="240" y2="118" stroke="#2d61a8" stroke-width="2"></line>
    <text x="80" y="142" font-size="10" font-weight="500" letter-spacing="0.16em" fill="#9aacc7">MDR Art. 10 · 11 · 13 · 14</text>
  </g>

  <g transform="translate(620 470)">
    
    <circle r="320" fill="none" stroke="#c8d5e8" stroke-width="1" stroke-dasharray="2 7"></circle>
    <circle r="220" fill="none" stroke="#c8d5e8" stroke-width="1" stroke-dasharray="2 7"></circle>
    <circle r="120" fill="none" stroke="#c8d5e8" stroke-width="1" stroke-dasharray="2 7"></circle>

    
    <g stroke="#2d61a8" stroke-width="1.6" stroke-dasharray="4 5" opacity="0.9">
      <line x1="0" y1="-48" x2="0" y2="-216"></line>
      <line x1="48" y1="0" x2="216" y2="0"></line>
      <line x1="0" y1="48" x2="0" y2="216"></line>
      <line x1="-48" y1="0" x2="-216" y2="0"></line>
    </g>

    
    <circle r="56" fill="none" stroke="#1c3068" stroke-width="1" opacity="0.3"></circle>
    <circle r="38" fill="#1c3068"></circle>
    <text y="3" text-anchor="middle" font-family="Inter" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.22em">DEVICE</text>

    
    <g transform="translate(0 -260)">
      <circle r="46" fill="#ffffff" stroke="#2d61a8" stroke-width="2"></circle>
      <text y="-3" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#1c3068" letter-spacing="0.18em">MFR</text>
      <text y="15" text-anchor="middle" font-family="Inter" font-size="9.5" font-weight="500" fill="#6b7c9d" letter-spacing="0.12em">Art. 10</text>
    </g>

    
    <g transform="translate(260 0)">
      <circle r="56" fill="none" stroke="#2d61a8" stroke-width="1" opacity="0.3"></circle>
      <circle r="46" fill="#2d61a8"></circle>
      <text y="-3" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.18em">AR</text>
      <text y="15" text-anchor="middle" font-family="Inter" font-size="9.5" font-weight="500" fill="rgba(255,255,255,0.75)" letter-spacing="0.12em">Art. 11</text>
    </g>

    
    <g transform="translate(0 260)">
      <circle r="56" fill="none" stroke="#2d61a8" stroke-width="1" opacity="0.3"></circle>
      <circle r="46" fill="#2d61a8"></circle>
      <text y="-3" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="0.18em">IMP</text>
      <text y="15" text-anchor="middle" font-family="Inter" font-size="9.5" font-weight="500" fill="rgba(255,255,255,0.75)" letter-spacing="0.12em">Art. 13</text>
    </g>

    
    <g transform="translate(-260 0)">
      <circle r="46" fill="#ffffff" stroke="#2d61a8" stroke-width="2"></circle>
      <text y="-3" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#1c3068" letter-spacing="0.18em">DIS</text>
      <text y="15" text-anchor="middle" font-family="Inter" font-size="9.5" font-weight="500" fill="#6b7c9d" letter-spacing="0.12em">Art. 14</text>
    </g>
  </g>

  
  <g font-family="Inter" letter-spacing="0.18em">
    <line x1="80" y1="800" x2="180" y2="800" stroke="#c8d5e8" stroke-width="1"></line>
    <text x="80" y="824" font-size="10" font-weight="600" fill="#6b7c9d">RESPONSIBILITY MAPPING</text>
    <text x="80" y="842" font-size="9" letter-spacing="0.14em" fill="#9aacc7">Manufacturer · AR · Importer · Distributor</text>
  </g>
</svg>