<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">日本から欧州へ：EU MDR 規制実務のパスウェイを抽象化した図</title>
  <desc id="desc">左にJP起点、右にBE/EU到達点、そのあいだの弧上にCER / MDR / UDI / AR・IMPの段階を示すドット。地図経緯線を想起させる薄い同心円。</desc>

  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafd"></stop>
      <stop offset="100%" stop-color="#e6edf6"></stop>
    </linearGradient>
    <pattern id="grid1" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c8d5e8" stroke-width="0.5" opacity="0.45"></path>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg1)"></rect>
  <rect width="1200" height="900" fill="url(#grid1)"></rect>

  
  <g fill="none" stroke="#5b91cc" stroke-width="1" opacity="0.22">
    <ellipse cx="600" cy="450" rx="520" ry="220"></ellipse>
    <ellipse cx="600" cy="450" rx="400" ry="170"></ellipse>
    <ellipse cx="600" cy="450" rx="280" ry="120"></ellipse>
  </g>

  
  <path d="M 280 480 Q 600 220 920 440" stroke="#2d61a8" stroke-width="2.4" fill="none" stroke-dasharray="2 8" stroke-linecap="round"></path>

  
  <g font-family="Inter, sans-serif" font-size="11" fill="#6b7c9d" letter-spacing="0.22em">
    <text x="80" y="100" font-weight="600">REGULATORY PATHWAY</text>
    <line x1="80" y1="118" x2="220" y2="118" stroke="#2d61a8" stroke-width="2"></line>
    <text x="80" y="142" font-size="10" font-weight="500" letter-spacing="0.16em" fill="#9aacc7">Japan → Belgium · EU</text>
  </g>

  
  <g font-family="Inter, sans-serif" letter-spacing="0.18em">
    
    <circle cx="430" cy="335" r="5" fill="#ffffff" stroke="#2d61a8" stroke-width="2"></circle>
    <text x="430" y="318" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1c3068">CER</text>

    
    <circle cx="600" cy="288" r="7" fill="#2d61a8"></circle>
    <text x="600" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#1c3068">MDR</text>

    
    <circle cx="770" cy="335" r="5" fill="#ffffff" stroke="#2d61a8" stroke-width="2"></circle>
    <text x="770" y="318" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1c3068">UDI</text>
  </g>

  
  <g>
    <circle cx="280" cy="480" r="44" fill="none" stroke="#1c3068" stroke-width="1" opacity="0.25"></circle>
    <circle cx="280" cy="480" r="26" fill="none" stroke="#1c3068" stroke-width="1.5" opacity="0.55"></circle>
    <circle cx="280" cy="480" r="11" fill="#1c3068"></circle>
    <text x="280" y="555" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#1c3068" letter-spacing="0.24em">JP</text>
    <text x="280" y="576" text-anchor="middle" font-family="Inter" font-size="10" font-weight="500" fill="#6b7c9d" letter-spacing="0.12em">Manufacturer</text>
  </g>

  
  <g>
    <circle cx="920" cy="440" r="56" fill="none" stroke="#2d61a8" stroke-width="1" opacity="0.25"></circle>
    <circle cx="920" cy="440" r="34" fill="none" stroke="#2d61a8" stroke-width="1.5" opacity="0.55"></circle>
    <circle cx="920" cy="440" r="15" fill="#2d61a8"></circle>
    <text x="920" y="520" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#1c3068" letter-spacing="0.24em">BE · EU</text>
    <text x="920" y="541" text-anchor="middle" font-family="Inter" font-size="10" font-weight="500" fill="#6b7c9d" letter-spacing="0.12em">3New SRL</text>
  </g>

  
  <g font-family="Inter" font-size="10" fill="#9aacc7" letter-spacing="0.18em">
    <line x1="80" y1="800" x2="180" y2="800" stroke="#c8d5e8" stroke-width="1"></line>
    <text x="80" y="824" font-weight="600" fill="#6b7c9d">MDR (EU) 2017/745</text>
    <text x="80" y="842" font-size="9" letter-spacing="0.14em">Art. 10 · 11 · 13 · Annex I</text>
  </g>
</svg>